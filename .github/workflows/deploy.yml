name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: kbase_bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            kbase_bot/deps
            kbase_bot/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('kbase_bot/mix.lock') }}

      - name: Install deps
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod

      - name: Build release
        env:
          MIX_ENV: prod
        run: mix release

      - name: Package release
        run: tar -czf /tmp/kbase_bot.tar.gz -C _build/prod/rel/kbase_bot .

      - name: Deploy to VM
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VM_IP: ${{ secrets.VM_IP }}
          BOT_ENV: ${{ secrets.BOT_ENV }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan $VM_IP >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key $VM_USER@$VM_IP"
          SCP="scp -i ~/.ssh/deploy_key"

          $SCP /tmp/kbase_bot.tar.gz $VM_USER@$VM_IP:~/kbase_bot.tar.gz
          echo "$BOT_ENV" | $SSH 'cat > ~/personal/kbase_bot/.env && chmod 600 ~/personal/kbase_bot/.env'

          $SSH 'bash -s' << 'DEPLOY'
            set -euxo pipefail

            cd ~/personal/kbase_bot
            ./release/bin/kbase_bot stop 2>/dev/null || true
            sleep 5

            cd ~/personal
            git fetch origin
            git reset --hard origin/master
            cd ~/personal/kbase_bot

            AGE_KEY_FILE=~/.age/personal.key bash ~/personal/scripts/decrypt.sh

            rm -rf release
            mkdir release
            tar -xzf ~/kbase_bot.tar.gz -C release
            rm ~/kbase_bot.tar.gz

            source .env
            release/bin/kbase_bot daemon
            sleep 5
            release/bin/kbase_bot pid
            echo "Deploy OK"
          DEPLOY
